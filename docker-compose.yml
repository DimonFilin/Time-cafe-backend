services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: time-cafe-keycloak
    environment:
      # Режим разработки (для быстрого старта без настройки БД)
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      # Используем встроенную БД для разработки (H2)
      KC_DB: dev-file
      # Настройки для production (можно раскомментировать позже)
      # KC_DB: postgres
      # KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      # KC_DB_USERNAME: keycloak
      # KC_DB_PASSWORD: keycloak
    ports:
      - '8080:8080'
    command: start-dev
    healthcheck:
      test:
        ['CMD-SHELL', 'curl -f http://localhost:8080/health/ready || exit 1']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - time-cafe-network

  # Опционально: PostgreSQL для Keycloak (для production)
  # keycloak-db:
  #   image: postgres:15
  #   container_name: time-cafe-keycloak-db
  #   environment:
  #     POSTGRES_DB: keycloak
  #     POSTGRES_USER: keycloak
  #     POSTGRES_PASSWORD: keycloak
  #   volumes:
  #     - keycloak-db-data:/var/lib/postgresql/data
  #   networks:
  #     - time-cafe-network

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: time-cafe-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Dev: любые origin (Expo, админка по LAN). В production сузьте до своих доменов.
      MINIO_API_CORS_ALLOW_ORIGIN: '*'
    ports:
      - '9000:9000' # API endpoint
      - '9001:9001' # Web Console
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - time-cafe-network

  # Appsmith Admin Panel
  appsmith:
    image: appsmith/appsmith-ce:latest
    container_name: time-cafe-appsmith
    environment:
      APPSMITH_ENCRYPTION_PASSWORD: timecaffe-encryption-key-2024
      APPSMITH_ADMIN_EMAILS: admin@timecaffe.com
      APPSMITH_DISABLE_EMBEDDED_KEYCLOAK: '1'
      APPSMITH_DISABLE_TELEMETRY: '1'
    ports:
      - '8081:80'
    volumes:
      - appsmith_data:/appsmith-stacks
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    depends_on:
      - keycloak
    networks:
      - time-cafe-network

networks:
  time-cafe-network:
    driver: bridge

volumes:
  minio_data:
    driver: local
  appsmith_data:
    driver: local
