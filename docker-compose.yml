services:
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6
    container_name: time-cafe-keycloak
    environment:
      # Режим разработки (для быстрого старта без настройки БД)
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: 'true'
      KC_METRICS_ENABLED: 'true'
      # Используем встроенную БД для разработки (H2)
      KC_DB: dev-file
      # Настройки для production (можно раскомментировать позже)
      # KC_DB: postgres
      # KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      # KC_DB_USERNAME: keycloak
      # KC_DB_PASSWORD: keycloak
    ports:
      - "8080:8080"
    command: start-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - time-cafe-network

  # Опционально: PostgreSQL для Keycloak (для production)
  # keycloak-db:
  #   image: postgres:15
  #   container_name: time-cafe-keycloak-db
  #   environment:
  #     POSTGRES_DB: keycloak
  #     POSTGRES_USER: keycloak
  #     POSTGRES_PASSWORD: keycloak
  #   volumes:
  #     - keycloak-db-data:/var/lib/postgresql/data
  #   networks:
  #     - time-cafe-network

networks:
  time-cafe-network:
    driver: bridge

